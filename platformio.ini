; PlatformIO Project Configuration File
; DMX Interceptor - ESP32 (WROOM-32) DMX pass-through with sACN override
;
; Build: pio run
; Upload: pio run --target upload
; Upload FS: pio run --target uploadfs
; Monitor: pio device monitor

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Libraries
lib_deps =
    someweisguy/esp_dmx@^4.1.0
    bblanchon/ArduinoJson@^7.0.0
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    https://github.com/me-no-dev/AsyncTCP.git
    https://github.com/forkineye/ESPAsyncE131.git
    CNMAT/OSC

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=0
    -DCONFIG_ASYNC_TCP_PRIORITY=5

; Partition scheme with LittleFS for web UI + config
board_build.partitions = default.csv
board_build.filesystem = littlefs

[env:esp32-s3-zero]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Libraries
lib_deps =
    someweisguy/esp_dmx@^4.1.0
    bblanchon/ArduinoJson@^7.0.0
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    https://github.com/me-no-dev/AsyncTCP.git
    https://github.com/forkineye/ESPAsyncE131.git
    CNMAT/OSC

; Build flags for USB CDC, PSRAM, and ESP32-S3-Zero target identification
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DESP32_S3_ZERO

; Hardware specific overrides
board_upload.flash_size = 4MB
board_build.arduino.memory_type = qio_qspi
board_build.partitions = default.csv
board_build.filesystem = littlefs

